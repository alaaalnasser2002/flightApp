<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Airline Booking Form</title>
    <!-- Style CSS -->
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        background-image: url("./pictures/air.png");
        background-size: 100%;
      }
    </style>
  </head>

  <body>
    <main class="main-content">
      <div class="booking-form">
        <!-- Form starts here -->
        <form action="#" method="post">
          <h2 class="sub-heading">Booking Details</h2>
          <div class="flex-container">
            <div class="field form-text1">
              <select class="form-control">
                <option value="">From</option>
                <option value="">AER - SO-SOSHI</option>
                <option value="">ALG - ALGERIA-HAWARI BO M..</option>
                <option value="">ALP - ALEPPO INTERNATIONA..</option>
                <option value="">AMM - QUEEN ALIA AIRPORT</option>
                <option value="">AUH - Abu Dhabi International..</option>
                <option value="">BAH - BAHRAIN INTERNATIO..</option>
                <option value="">BEY - LEBANON INTERNATIO..</option>
                <option value="">BGW - BAGDAD INTERNATI..</option>
                <option value="">CAI - CAIRO INTERNATIONAL..</option>
                <option value="">DAM - DAMASCUS</option>
                <option value="">DEZ - DEREZZOR INTERNAT..</option>
                <option value="">DMM - DAMMAM INTERNATIO..</option>
                <option value="">DOH - HAMAD INTERNATION..</option>
                <option value="">DXB - DUBAI INTERNATIONAL..</option>
                <option value="">EBL - ERBIL INTERNATIONAL..</option>
                <option value="">KWI - KUWAIT INTERNATIONAL</option>
                <option value="">RUH - RYIADH INTERNATIONAL</option>
                <option value="">SHJ - SHARJAH INTERNATIONAL</option>
              </select>
            </div>
            <div class="field form-text2">
              <select class="form-control">
                <option value="">To</option>
                <option value="">AUH - Abu Dhabi International..</option>
                <option value="">CAI - CAIRO INTERNATIONAL..</option>
                <option value="">DOH - HAMAD INTERNATION..</option>
                <option value="">DXB - DUBAI INTERNATIONAL..</option>
                <option value="">KWI - KUWAIT INTERNATIONAL</option>
                <option value="">RUH - RYIADH INTERNATIONAL</option>
                <option value="">SHJ - SHARJAH INTERNATIONAL</option>
                <option value="">VCO - MOSCOW VNOKVO AIRPORT</option>
              </select>
            </div>
          </div>
          <div class="flex-container">
            <div class="field form-text1">
              <select class="form-control">
                <option>Currency</option>
                <option value="USD">USD</option>
                <option value="SYP">SYP</option>

              </select>
            </div>
            <div class="field form-text2">
              <select class="form-control">
                <option>Preferred Seating</option>
                <option value="Window">Window</option>
                <option value="Aisle">Aisle</option>
                <option value="Special">Special (Request note below)</option>
              </select>
            </div>
          </div>
          <div class="flex-container">
            <div class="field form-text1">
              <input
                id="datepicker"
                name="Text"
                type="text"
                placeholder="Departure Date"
                value=""
                onfocus="this.value = '';"
                onblur="if (this.value == '') {this.value = 'mm/dd/yyyy';}"
                required=""
                class="hasDatepicker"
              />
            </div>
            <div class="field form-text2">
              <input
                type="text"
                id="timepicker"
                name="Time"
                class="timepicker form-control hasWickedpicker"
                placeholder="Departure Time"
                value=""
                onkeypress="return true;"
              />
            </div>
          </div>
          <div class="triple-container">
            <div class="field form-text11">
              <select class="form-control">
                <option value="">Adult(12+ Yrs)</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5+</option>
              </select>
            </div>
            <div class="field form-text22">
              <select class="form-control">
                <option value="">Children(2-11 Yrs)</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5+</option>
              </select>
            </div>
            <div class="field form-text33">
              <select class="form-control">
                <option value="">Infant(under 2Yrs)</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5+</option>
              </select>
            </div>
          </div>
          <div class="radio-container">
            <h6>Select your Fare</h6>
            <ul class="radio-buttons">
              <li>
                <input type="radio" id="one-way" name="fare-option" />
                <label for="one-way">One Way</label>
                <div class="check"></div>
              </li>
              <li>
                <input type="radio" id="round-trip" name="fare-option" />
                <label for="round-trip">Round-Trip</label>
                <div class="check">
                  <div class="inside"></div>
                </div>
              </li>
            </ul>
          </div>
          <div class="flex-container">
            <div class="field form-text1">
              <input
                id="return-date"
                name="Text"
                type="text"
                placeholder="Return Date"
                value=""
                onfocus="this.value = '';"
                onblur="if (this.value == '') {this.value = 'mm/dd/yyyy';}"
                required=""
                class="hasDatepicker"
              />
            </div>
            <div class="field form-text2">
              <input
                type="text"
                id="return-time"
                name="Time"
                class="timepicker form-control hasWickedpicker"
                placeholder="Return Time"
                value=""
                onkeypress="return true;"
              />
            </div>
          </div>
          <div class="field form-text">
            <textarea name="Message" placeholder="Any Message..."></textarea>
          </div>
          <h3 class="sub-heading">Personal Details</h3>
          <div class="flex-container">
            <div class="field form-text1">
              <input
                type="text"
                name="Name"
                placeholder="Full Name"
                required=""
              />
            </div>
            <div class="field form-text2">
              <input
                type="text"
                name="Phone no"
                placeholder="Phone Number"
                required=""
              />
            </div>
          </div>
          <div class="field form-text">
            <input type="email" name="Email" placeholder="Email" required="" />
          </div>

          <input type="submit" value="Submit" />
          <input type="reset" value="Clear Form" />
        </form>
        <!--// Form starts here -->
      </div>
    </main>
  </body>
</html>
